name: Release

# Publishes on a version tag (e.g. v0.1.0):
#   * pypi   — builds sdist+wheel and publishes via PyPI Trusted Publishing
#              (OIDC, no token). Gated on the PYPI_ENABLED repo variable so the
#              release stays green before PyPI is configured. To enable: add this
#              repo+workflow as a trusted publisher at
#              https://pypi.org/manage/account/publishing/, then set repository
#              variable PYPI_ENABLED=true (Settings → Secrets and variables →
#              Actions → Variables).
#   * docker — builds the image and pushes it to GHCR using the built-in
#              GITHUB_TOKEN (no extra secret needed). Runs on every release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  pypi:
    name: Build & publish to PyPI
    if: vars.PYPI_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    name: Build & push image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
